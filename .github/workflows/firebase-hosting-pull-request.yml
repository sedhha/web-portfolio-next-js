name: Deploy to Firebase Hosting on PR
'on': pull_request
jobs:
  build_and_preview:
    if: '${{ github.event.pull_request.head.repo.full_name == github.repository }}'
    runs-on: ubuntu-latest
    env:
      FIREBASE_DEPLOYMENT_ENVIRONMENT: production
    steps:
      - uses: actions/checkout@v2
      - uses: actions/setup-node@v1
        with:
          node-version: 14.19.1
      - name: Install Yarn
        run: |
          yarn
      - run: touch .env.local
          echo FIREBASE_DEPLOYMENT_ENVIRONMENT=production >> .env.local
      - run: yarn && yarn export
      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: '${{ secrets.GITHUB_TOKEN }}'
          firebaseServiceAccount: '${{ secrets.FIREBASE_SERVICE_ACCOUNT_SHIVAM_SAHIL }}'
          projectId: shivam-sahil
